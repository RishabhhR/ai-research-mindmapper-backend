<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      background: #0f0f13;
      color: #e8e8f0;
      padding: 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #video-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 12px;
      color: #e8e8f0;
      display: none;
    }

    #status {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      min-height: 16px;
      line-height: 1.4;
    }
    #status.error   { color: #f87171; }
    #status.success { color: #4ade80; }

    button#send-btn {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #7c3aed;
      color: #fff;
      transition: opacity .15s;
    }
    button#send-btn:disabled { opacity: .45; cursor: default; }
    button#send-btn:not(:disabled):hover { opacity: .85; }

    #result-link {
      display: none;
      font-size: 12px;
      color: #a78bfa;
      text-align: center;
      margin-top: 10px;
      line-height: 1.6;
    }
    #result-link a { color: inherit; }
  </style>
</head>
<body>
  <h1>AI Research Mindmapper</h1>
  <div id="video-title"></div>
  <div id="status">Loading…</div>
  <button id="send-btn" disabled>Send transcript to Mindmapper</button>
  <div id="result-link"></div>
  <script src="popup.js"></script>
</body>
</html>
